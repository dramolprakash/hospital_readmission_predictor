# Prometheus configuration for monitoring the readmission prediction API

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Readmission API monitoring
  - job_name: 'readmission-api'
    static_configs:
      - targets: ['readmission-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s
    
  # Health check monitoring
  - job_name: 'readmission-api-health'
    static_configs:
      - targets: ['readmission-api:8000']
    metrics_path: '/health'
    scrape_interval: 30s
    scrape_timeout: 5s